<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Gen I</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <nav>
        <img src="./assets/logo.png" alt="Logo" class="logo" />
        <img src="./assets/menu.svg" alt="Menu" class="menu" />
      </nav>
      <div class="center">
        <div class="text">
          <h1 class="genI">Pokemon Gen I</h1>
          <h1 class="pikachu">Pikachu</h1>
          <p class="description">
            Pikachu is an Electric-type Pokémon introduced <br />
            in Generation I. Pikachu are small, chubby, <br />
            and incredibly cute mouse-like Pokémon.<br />
            They are almost completely covered by <br />
            yellow fur.
          </p>
          <div class="page">
            <img src="./assets/line.svg" alt="line" class="line" />
            <span>01 / 08</span>
          </div>
        </div>
        <div class="dots">
          <span class="active"></span>
          <span class="not-active"></span>
          <span class="not-active"></span>
          <span class="not-active"></span>
          <span class="not-active"></span>
        </div>
      </div>
      <img src="./assets/pikachu.png" alt="Pikachu" class="pikachu-img" />
      <img src="./assets/ball.svg" alt="Ball" class="ball">
    </main>
  </body>
</html>
