<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="input">
      <h1>Add Movie</h1>
      <form action="">
        <input required class="enter" id="url" placeholder="Poster URL" />
        <input required class="enter" id="name" type="text" placeholder="Movie Name" />
        <input required class="enter" id="year" type="text" placeholder="Year" />
        <input required class="enter" id="running-time" type="text" placeholder="Running Time" />
        <input required class="enter" id="directed-by" type="text" placeholder="Directed By" />
        <input required class="enter" id="produced-by" type="text" placeholder="Produced By" />
        <input required class="enter" id="starring" type="text" placeholder="Starring" />
        <button id="btn" type="submit">Submit</button>
    </form>
    </div>
    <div class="grid">
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
